name: CI

# Build + test on every push/PR; a v* tag additionally packs with a clean (public-release)
# version and pushes the EdgeHop global tool to nuget.org.
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cross-compile the native edgehop-oxc binary for all three shipped RIDs. Only win-x64 is
  # committed to the repo; linux-x64 and osx-arm64 are produced here and bundled into the pack.
  oxc:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triple: x86_64-pc-windows-gnu
            rid: win-x64
            binary: edgehop-oxc.exe
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            rid: linux-x64
            binary: edgehop-oxc
          - os: macos-14
            triple: aarch64-apple-darwin
            rid: osx-arm64
            binary: edgehop-oxc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          fi
          rustup target add ${{ matrix.triple }}

      - name: Build edgehop-oxc
        working-directory: Extractors/EdgeHop.Oxc/native
        run: cargo build --release --target ${{ matrix.triple }}

      - name: Mark Unix binary executable
        if: matrix.os != 'windows-latest'
        run: chmod +x Extractors/EdgeHop.Oxc/native/target/${{ matrix.triple }}/release/${{ matrix.binary }}

      - name: Upload oxc binary
        uses: actions/upload-artifact@v4
        with:
          name: oxc-${{ matrix.rid }}
          path: Extractors/EdgeHop.Oxc/native/target/${{ matrix.triple }}/release/${{ matrix.binary }}
          if-no-files-found: error

  build:
    # Build/test/pack on Windows (the exe/verb/stdio tests run the real Windows executables).
    # All three RIDs of the native edgehop-oxc binary (win-x64, linux-x64, osx-arm64) are built
    # by the oxc job and downloaded into tools/<rid>/ below so the packed tool bundles all three.
    needs: [oxc]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Nerdbank.GitVersioning needs full history for git height.

      - name: Download win-x64 oxc binary
        uses: actions/download-artifact@v4
        with:
          name: oxc-win-x64
          path: Extractors/EdgeHop.Oxc/tools/win-x64

      - name: Download linux-x64 oxc binary
        uses: actions/download-artifact@v4
        with:
          name: oxc-linux-x64
          path: Extractors/EdgeHop.Oxc/tools/linux-x64

      - name: Download osx-arm64 oxc binary
        uses: actions/download-artifact@v4
        with:
          name: oxc-osx-arm64
          path: Extractors/EdgeHop.Oxc/tools/osx-arm64

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build EdgeHop.sln -c Release

      # EdgeHop.Neo4j.Tests need a live Neo4j (NEO4J_*), which CI does not provide — they
      # skip themselves when unset. Running the main suite covers the 271 non-Neo4j tests,
      # including the fixture/sample anchors and the unified-command dispatcher tests.
      - name: Test
        run: dotnet test tests/EdgeHop.Tests/EdgeHop.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      # Pack on every run to validate packaging. On a tag this is the release artifact;
      # PublicRelease=true drops the local -gXXXX suffix so the pushed version is clean.
      - name: Pack
        run: dotnet pack EdgeHop.Tool/EdgeHop.Tool.csproj -c Release --no-build -p:PublicRelease=true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeHop-nupkg
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  publish:
    # Push to nuget.org only for v* tags, via NuGet Trusted Publishing (OIDC — no stored
    # API key). Requires a trusted-publishing policy on nuget.org matching owner=EdgeHop,
    # repo=EdgeHop, workflow=ci.yml, environment=nuget. See README "Installation".
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    environment: nuget
    permissions:
      id-token: write   # let GitHub mint the OIDC token nuget.org exchanges for a temp key
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: EdgeHop-nupkg
          path: artifacts/nuget

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Exchange the OIDC token for a short-lived (1 h) nuget.org API key immediately
      # before pushing. NUGET_USER is the nuget.org profile name (not an email, not secret;
      # stored as a secret only per NuGet's recommendation).
      - name: NuGet login (OIDC -> short-lived key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      # Resolve the .nupkg explicitly: pwsh does not glob inside quotes and dotnet's own
      # wildcard matcher is unreliable with forward-slash paths on the Windows runner, so
      # a bare "artifacts/nuget/*.nupkg" fails with "File does not exist".
      - name: Push to nuget.org
        shell: pwsh
        run: |
          $pkg = Get-ChildItem artifacts/nuget/*.nupkg | Select-Object -First 1
          if (-not $pkg) { throw "No .nupkg found in artifacts/nuget" }
          Write-Host "Pushing $($pkg.Name)"
          dotnet nuget push $pkg.FullName `
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
